# All config and secrets are loaded from the root .env file.
# Copy .env.example to .env and fill in your values before running.
# See README.md for the list of required variables.

services:
  backend:
    build: ./backend
    env_file:
      - .env
    ports:
      - "9090:9090"
    environment:
      - SERVER_PORT=9090
      - H2_DB_PATH=/app/data/collabry
    networks:
      - app-network
    volumes:
      - ./data:/app/data

  frontend:
    build: ./frontend
    env_file:
      - .env
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:9090/api/auth}
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
