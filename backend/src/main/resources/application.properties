spring.application.name=backend
# Use MySQL if SPRING_DATASOURCE_URL is set (deployed), otherwise fall back to H2 (local dev)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:${H2_DB_PATH:./data/collabry}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.h2.console.enabled=true
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=update
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
server.port=${SERVER_PORT:9090}

# --- Mail: for real emails use the "local" profile and application-local.properties ---
# Copy application-local.properties.example to application-local.properties (gitignored),
# add your SMTP settings (e.g. Gmail app password), then run with the local profile.
# PowerShell: .\mvnw.cmd spring-boot:run "-Dspring-boot.run.jvmArguments=-Dspring.profiles.active=local"
# Without spring.mail.host set, confirmation emails are only logged to the console.

# Frontend base URL for confirmation link in email (no trailing slash)
app.confirmation.base-url=http://localhost:5173

# Groq API Configuration mapping
groq.api.key=${GROQ_API_KEY:dummy}
spring.ai.groq.api-key=${GROQ_API_KEY:dummy}

# Cloudinary image upload
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Allow multipart uploads up to 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB